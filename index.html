<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>GrowthOS Manifesto · 2027</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @font-face {
    font-family: 'Graphik';
    src: url('./Graphik Font/Graphik-Light.otf') format('opentype');
    font-weight: 300; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Graphik';
    src: url('./Graphik Font/Graphik-LightItalic.otf') format('opentype');
    font-weight: 300; font-style: italic; font-display: swap;
  }
  @font-face {
    font-family: 'Graphik';
    src: url('./Graphik Font/Graphik-Regular.otf') format('opentype');
    font-weight: 400; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Graphik';
    src: url('./Graphik Font/Graphik-RegularItalic.otf') format('opentype');
    font-weight: 400; font-style: italic; font-display: swap;
  }
  @font-face {
    font-family: 'Graphik';
    src: url('./Graphik Font/Graphik-Semibold.otf') format('opentype');
    font-weight: 600; font-style: normal; font-display: swap;
  }
  @font-face {
    font-family: 'Graphik';
    src: url('./Graphik Font/Graphik-SemiboldItalic.otf') format('opentype');
    font-weight: 600; font-style: italic; font-display: swap;
  }
  :root {
    --bg: #120318;
    --bg-2: #1c0826;
    --accent: #6936F5;
    --accent-soft: #A87CFF;
    --accent-deep: #3D1F8F;
    --warn: #F5A623;
    --ink: #FFFFFF;
    --ink-dim: rgba(255,255,255,0.65);
    --ink-faint: rgba(255,255,255,0.32);
    --ink-ghost: rgba(255,255,255,0.12);
    --rule: rgba(255,255,255,0.10);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #120318; color: var(--ink); }
  body {
    font-family: 'Graphik', 'Inter', system-ui, sans-serif;
    line-height: 1.55;
    font-size: 16px;
    overflow-x: hidden;
  }
  html { scroll-behavior: smooth; }
  h1, h2, h3, .display { font-family: 'Graphik', 'Inter', sans-serif; letter-spacing: -0.025em; font-weight: 400; }
  h1 { font-size: 72px; line-height: 1.06; margin: 0; letter-spacing: -0.04em; font-weight: 400; }
  h2 { font-size: 56px; line-height: 1.08; margin: 0 0 20px; letter-spacing: -0.035em; font-weight: 400; }
  h3 { font-size: 22px; line-height: 1.2; margin: 0; font-weight: 400; }
  p  { margin: 0 0 14px; color: var(--ink-dim); }
  a  { color: var(--accent-soft); text-decoration: none; }
  .accent { color: var(--accent-soft); }
  em { color: var(--accent-soft); font-style: italic; }

  /* Exec summary strip */
  .execSummary {
    position: relative; z-index: 2;
    max-width: 1320px; margin: 0 auto;
    padding: 100px 56px 32px;
  }
  .execGrid {
    display: grid;
    grid-template-columns: 1fr 1px 1fr 1px 1fr;
    gap: 32px;
    align-items: stretch;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--rule);
  }
  .execFrameRule {
    background: var(--rule);
    width: 1px;
    align-self: stretch;
  }
  .execFrame { padding: 0 4px; }
  .execEyebrow {
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--accent-soft); font-weight: 400;
    margin-bottom: 12px;
  }
  .execBody {
    font-size: 15px; line-height: 1.55;
    color: var(--ink-dim);
  }
  .execBody em { font-style: italic; color: var(--accent-soft); }
  .execReadOn {
    display: inline-block;
    margin-top: 18px;
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 12px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--ink-faint); font-weight: 400;
    text-decoration: none;
    transition: color 200ms;
  }
  .execReadOn:hover { color: var(--accent-soft); }
  @media (max-width: 880px) {
    .execSummary { padding: 100px 32px 24px; }
    .execGrid { grid-template-columns: 1fr; gap: 22px; }
    .execFrameRule { display: none; }
  }

  /* Atmosphere — flat single color, no grid, no glow */
  .glow, .grid { display: none; }

  /* Nav */
  nav.top {
    position: fixed; top: 0; left: 0; right: 0;
    z-index: 100;
    padding: 22px 56px;
    display: flex; align-items: center; justify-content: space-between;
    background: linear-gradient(180deg, rgba(18,3,24,0.92), rgba(18,3,24,0.55) 80%, transparent);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    pointer-events: none;
  }
  nav.top * { pointer-events: auto; }
  .brand {
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-dim); font-weight: 400;
    font-family: 'Graphik', 'Inter', sans-serif;
  }
  .navmark { width: 20px; height: auto; display: block; }
  .star {
    width: 18px; height: 18px;
    background: var(--accent-soft);
    -webkit-mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'><path d='M81.94 37.98L67.04 0H53.75H53.35L38.05 37.75L0 52.69V66.39L37.76 81.7L52.67 119.7H66.36L81.67 81.92L119.69 67V53.3L81.94 37.99V37.98Z' fill='black'/></svg>") center/contain no-repeat;
    mask: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 120 120'><path d='M81.94 37.98L67.04 0H53.75H53.35L38.05 37.75L0 52.69V66.39L37.76 81.7L52.67 119.7H66.36L81.67 81.92L119.69 67V53.3L81.94 37.99V37.98Z' fill='black'/></svg>") center/contain no-repeat;
  }
  nav.top ul {
    list-style: none; margin: 0; padding: 0;
    display: flex; gap: 24px;
  }
  nav.top a {
    color: var(--ink-dim);
    font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase;
    font-weight: 400; transition: color 200ms;
  }
  nav.top a:hover { color: var(--ink); }
  nav.top .pill {
    font-size: 11px; letter-spacing: 0.18em; font-weight: 600;
    padding: 6px 12px; border-radius: 999px;
    border: 1px solid var(--accent-soft);
    color: var(--accent-soft);
    text-transform: uppercase;
    text-decoration: none;
    transition: background 200ms, color 200ms;
  }
  nav.top .pillLink:hover {
    background: var(--accent-soft);
    color: #120318;
  }

  section {
    position: relative; z-index: 1;
    padding: 140px 56px;
    max-width: 1320px; margin: 0 auto;
  }
  .eyebrow {
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 13px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--accent-soft); font-weight: 400;
    margin-bottom: 22px;
  }
  .lede { font-size: 20px; max-width: 780px; color: var(--ink-dim); line-height: 1.55; }
  .secHeader { max-width: 900px; margin-bottom: 60px; }

  /* Hero */
  .hero { padding-top: 200px; padding-bottom: 120px; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; }
  .hero .subhead {
    margin-top: 36px;
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 26px; line-height: 1.4;
    max-width: 900px; color: var(--ink);
    letter-spacing: -0.015em; font-weight: 400;
  }
  .northStar {
    margin-top: 56px;
    padding: 32px 36px;
    background: rgba(105,54,245,0.08);
    border: 1px solid rgba(168,124,255,0.22);
    border-left: 3px solid var(--accent-soft);
    border-radius: 14px;
    max-width: 960px;
  }
  .northStar .label {
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--accent-soft); font-weight: 700; margin-bottom: 14px;
  }
  .northStar .body { font-size: 19px; color: var(--ink); line-height: 1.55; }
  .northStar .body strong { color: var(--accent-soft); font-weight: 400; }
  .ctaRow { margin-top: 44px; display: flex; gap: 14px; flex-wrap: wrap; }
  .cta {
    display: inline-flex; align-items: center; gap: 10px;
    padding: 14px 22px; border-radius: 999px;
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 14px; letter-spacing: 0.04em; font-weight: 400;
    text-decoration: none; cursor: pointer; border: none;
    transition: transform 150ms, background 200ms;
  }
  .cta.primary { background: var(--accent); color: white; }
  .cta.primary:hover { background: var(--accent-soft); transform: translateY(-1px); }
  .cta.ghost { background: transparent; border: 1px solid var(--rule); color: var(--ink-dim); }
  .cta.ghost:hover { color: var(--ink); border-color: var(--accent-soft); }

  /* Truth pull-quote */
  .pullQuote {
    margin: 32px 0 0;
    padding: 36px 40px;
    border-left: 3px solid var(--accent-soft);
    background: rgba(255,255,255,0.025);
    border-radius: 10px;
    max-width: 1000px;
  }
  .pullQuote .q {
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 32px; line-height: 1.3;
    color: var(--ink);
    letter-spacing: -0.02em;
    font-weight: 400;
  }
  .pullQuote .q .accent { font-style: italic; }
  .pullQuote .cite {
    margin-top: 18px;
    font-size: 13px; letter-spacing: 0.24em;
    color: var(--ink-faint);
    text-transform: uppercase;
    font-family: 'Graphik', 'Inter', sans-serif;
  }

  /* Truth: numbered ledger of five forces */
  .truthList {
    margin: 56px 0 0;
    display: flex; flex-direction: column;
    border-top: 1px solid var(--rule);
  }
  .truthRow {
    display: grid;
    grid-template-columns: 120px 1fr;
    gap: 32px;
    padding: 28px 0;
    border-bottom: 1px solid var(--rule);
    align-items: start;
  }
  .truthNum {
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 44px;
    line-height: 1;
    letter-spacing: -0.02em;
    color: var(--accent-soft);
    font-weight: 300;
  }
  .truthBody { max-width: 760px; }
  .truthHead {
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 24px;
    line-height: 1.2;
    letter-spacing: -0.01em;
    color: var(--ink);
    margin-bottom: 10px;
    font-weight: 400;
  }
  .truthBody p {
    margin: 0;
    color: var(--ink-dim);
    font-size: 17px;
    line-height: 1.65;
  }
  .truthBody p .accent {
    color: var(--accent-soft);
    font-style: normal;
    font-weight: 400;
  }
  .srcRef {
    color: var(--accent-soft);
    font-size: 0.6em;
    text-decoration: none;
    vertical-align: super;
    line-height: 0;
    margin-left: 1px;
    padding: 0 2px;
    border-radius: 3px;
    transition: background 150ms;
  }
  .srcRef:hover { background: rgba(168,124,255,0.12); }
  .truthSources {
    margin-top: 56px;
    padding-top: 28px;
    border-top: 1px solid var(--rule);
    max-width: 900px;
  }
  .truthSources .srcLabel {
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 11px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--ink-faint); margin-bottom: 14px;
    font-weight: 400;
  }
  .truthSources ol {
    list-style: none; margin: 0; padding: 0;
    counter-reset: src;
  }
  .truthSources li {
    font-size: 13px; line-height: 1.6;
    color: var(--ink-faint);
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    scroll-margin-top: 100px;
  }
  .truthSources li:last-child { border-bottom: none; }
  .truthSources li:target {
    color: var(--ink-dim);
    background: rgba(168,124,255,0.04);
  }
  .truthSources .srcNum {
    color: var(--accent-soft);
    font-weight: 400;
    margin-right: 8px;
  }
  .truthExamples {
    margin-top: 14px !important;
    padding-left: 14px;
    border-left: 2px solid rgba(168, 124, 255, 0.25);
    font-size: 14.5px !important;
    line-height: 1.6 !important;
    color: var(--ink-faint) !important;
    font-style: italic;
  }

  /* Bet cards */
  .betsHint {
    margin-top: 28px;
    font-size: 12px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--accent-soft); font-weight: 400;
  }
  .betCards {
    margin-top: 36px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
  }
  @media (max-width: 880px) { .betCards { grid-template-columns: 1fr; } }
  .betCard {
    appearance: none;
    background: rgba(255,255,255,0.025);
    border: 1px solid var(--rule);
    border-radius: 18px;
    padding: 32px 28px 28px;
    text-align: left;
    color: inherit;
    font: inherit;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 14px;
    position: relative;
    overflow: hidden;
    transition: transform 220ms ease, border-color 220ms ease, background 220ms ease, box-shadow 220ms ease;
  }
  .betCard::before {
    content: "";
    position: absolute; inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 0%, rgba(168,124,255,0.08), transparent 70%);
    opacity: 0;
    transition: opacity 240ms ease;
    pointer-events: none;
  }
  .betCard:hover, .betCard:focus-visible {
    transform: translateY(-3px);
    border-color: rgba(168,124,255,0.5);
    background: rgba(168,124,255,0.04);
    box-shadow: 0 18px 40px -24px rgba(105,54,245,0.6);
  }
  .betCard:hover::before, .betCard:focus-visible::before { opacity: 1; }
  .betCard:focus-visible { outline: none; }
  .betIcon {
    width: 64px; height: 64px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 320ms ease;
  }
  .betCard:hover .betIcon { transform: scale(1.06) rotate(-2deg); }
  .betIcon svg { width: 100%; height: 100%; display: block; }
  .betNum {
    font-family: 'Graphik', 'Inter', monospace;
    font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--ink-faint); font-weight: 400;
  }
  .betName {
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 24px; line-height: 1.15;
    color: var(--ink); font-weight: 400;
    letter-spacing: -0.015em;
  }
  .betTeaser {
    font-size: 15px; line-height: 1.55;
    color: var(--ink-dim);
    flex-grow: 1;
  }
  .betCta {
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 13px; letter-spacing: 0.02em;
    color: var(--accent-soft);
    display: flex; align-items: center; gap: 8px;
    margin-top: 8px;
    padding-top: 14px;
    border-top: 1px solid rgba(168,124,255,0.18);
  }
  .betCtaArrow {
    display: inline-block;
    transition: transform 240ms ease;
  }
  .betCard:hover .betCtaArrow { transform: translateX(4px); }

  /* Conviction divider + card */
  .convictionDivider {
    margin: 48px 0 28px;
    display: flex; align-items: center; gap: 18px;
  }
  .convictionRule {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, rgba(168,124,255,0.32), transparent);
  }
  .convictionEyebrow {
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--accent-soft); font-weight: 400;
    white-space: nowrap;
  }
  .convictionCard {
    appearance: none;
    width: 100%;
    background: linear-gradient(135deg, rgba(105,54,245,0.22), rgba(168,124,255,0.10));
    border: 1px solid rgba(168,124,255,0.55);
    border-radius: 22px;
    padding: 36px 40px;
    text-align: left;
    color: inherit;
    font: inherit;
    cursor: pointer;
    display: grid;
    grid-template-columns: 80px 1fr auto;
    gap: 28px;
    align-items: center;
    position: relative;
    overflow: hidden;
    transition: transform 240ms ease, border-color 240ms ease, box-shadow 240ms ease;
  }
  .convictionCard:hover, .convictionCard:focus-visible {
    transform: translateY(-3px);
    border-color: var(--accent-soft);
    box-shadow: 0 24px 56px -24px rgba(105,54,245,0.7);
    outline: none;
  }
  .convictionIcon {
    width: 80px; height: 80px;
    display: flex; align-items: center; justify-content: center;
    transition: transform 320ms ease;
  }
  .convictionCard:hover .convictionIcon { transform: scale(1.05) rotate(-2deg); }
  .convictionIcon svg { width: 100%; height: 100%; display: block; }
  .convictionBody { min-width: 0; }
  .convictionNum {
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--accent-soft); font-weight: 400;
    margin-bottom: 8px;
  }
  .convictionName {
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 30px; line-height: 1.15;
    color: var(--ink); font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
  }
  .convictionTeaser {
    font-size: 16px; line-height: 1.55;
    color: var(--ink-dim);
    max-width: 680px;
  }
  .convictionCta {
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 13px; letter-spacing: 0.02em;
    color: var(--accent-soft);
    display: flex; align-items: center; gap: 8px;
    padding: 12px 20px;
    border: 1px solid rgba(168,124,255,0.45);
    border-radius: 999px;
    background: rgba(168,124,255,0.06);
    white-space: nowrap;
  }
  .convictionCtaArrow { display: inline-block; transition: transform 240ms ease; }
  .convictionCard:hover .convictionCtaArrow { transform: translateX(4px); }
  .betModalConviction {
    background: linear-gradient(135deg, #1d0a2e, #1a0a26);
    border-color: rgba(168,124,255,0.45);
  }
  @media (max-width: 880px) {
    .convictionCard { grid-template-columns: 1fr; gap: 18px; padding: 28px 24px; }
    .convictionIcon { width: 56px; height: 56px; }
    .convictionName { font-size: 24px; }
    .convictionDivider { flex-wrap: wrap; }
    .convictionEyebrow { font-size: 11px; }
  }

  /* Bet modal */
  @keyframes betModalIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  @keyframes betModalSlide {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }
  .betModalOverlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(8,2,12,0.72);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    display: flex; align-items: center; justify-content: center;
    padding: 48px 24px;
    animation: betModalIn 200ms ease both;
  }
  .betModal {
    position: relative;
    background: #1a0a26;
    border: 1px solid rgba(168,124,255,0.25);
    border-radius: 22px;
    max-width: 820px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    padding: 48px 52px 44px;
    animation: betModalSlide 280ms cubic-bezier(0.2, 0.8, 0.2, 1) both;
    box-shadow: 0 32px 80px -16px rgba(0,0,0,0.6);
  }
  .betModalClose {
    position: absolute; top: 18px; right: 18px;
    width: 36px; height: 36px;
    background: transparent; border: 1px solid var(--rule);
    border-radius: 50%;
    color: var(--ink-dim);
    font-size: 22px; line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 160ms, border-color 160ms, background 160ms;
  }
  .betModalClose:hover { color: var(--ink); border-color: var(--accent-soft); background: rgba(168,124,255,0.08); }
  .betModalNum {
    font-family: 'Graphik', 'Inter', monospace;
    font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--accent-soft); font-weight: 400;
    margin-bottom: 12px;
  }
  .betModalTitle {
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 36px; line-height: 1.1;
    letter-spacing: -0.02em;
    color: var(--ink); font-weight: 400;
    margin: 0 0 22px;
  }
  .betModalBody {
    font-size: 17px; line-height: 1.65;
    color: var(--ink-dim);
    margin: 0 0 36px;
    max-width: 660px;
  }
  .betModalReceiptsLabel {
    font-family: 'Graphik', 'Inter', sans-serif;
    font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase;
    color: var(--accent-soft); font-weight: 400;
    margin-bottom: 18px;
    padding-top: 22px;
    border-top: 1px solid var(--rule);
  }
  .betModalReceipts {
    display: flex; flex-direction: column;
    gap: 18px;
  }
  .betReceipt {
    padding: 16px 20px;
    background: rgba(168,124,255,0.04);
    border: 1px solid rgba(168,124,255,0.12);
    border-radius: 12px;
  }
  .betReceiptHead {
    display: flex; align-items: baseline; gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .betReceiptWho {
    font-family: 'Graphik', 'Inter', sans-serif;
    color: var(--ink); font-weight: 400;
    font-size: 15px;
    letter-spacing: -0.005em;
  }
  .betReceiptDot { color: var(--ink-faint); }

  }
  .cmt-popup-body {
    font: 13px/1.55 'Graphik','Inter',sans-serif;
    color: var(--ink-dim);
    white-space: pre-wrap;
    word-wrap: break-word;
    margin-top: 8px;
  }
</style>

<button class="cmt-toggle active" id="cmt-toggle" aria-label="Toggle comments">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/>
  </svg>
  <span class="cmt-badge empty" id="cmt-badge">0</span>
</button>
<div class="cmt-hint">Right-click anywhere to leave a comment</div>

<div class="cmt-pins" id="cmt-pins"></div>

<div class="cmt-dialog hidden" id="cmt-dialog" role="dialog" aria-label="New comment">
  <div class="cmt-dialog-head">New comment</div>
  <input id="cmt-name" placeholder="Your initials or name" maxlength="40" autocomplete="off" />
  <textarea id="cmt-body" placeholder="What's on your mind?" maxlength="2000"></textarea>
  <div class="cmt-dialog-row">
    <button class="cmt-cancel" id="cmt-cancel">Cancel</button>
    <button class="cmt-submit" id="cmt-submit">Post</button>
  </div>
</div>

<div class="cmt-popup hidden" id="cmt-popup" role="dialog" aria-label="Comment"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js';
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp }
    from 'https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyBhrrBWIfYQUhKpRse5wA2rH9MTn2mcmSQ",
    authDomain: "growthos-manifesto.firebaseapp.com",
    projectId: "growthos-manifesto",
    storageBucket: "growthos-manifesto.firebasestorage.app",
    messagingSenderId: "203721735013",
    appId: "1:203721735013:web:aa96eaf74e82f888febf8c"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const colRef = collection(db, 'pageComments');
  const PAGE_KEY = 'manifesto-prototype';
  const SAVED_NAME_KEY = 'gosManifestoCommenterName';

  const toggleBtn = document.getElementById('cmt-toggle');
  const badge     = document.getElementById('cmt-badge');
  const pinsEl    = document.getElementById('cmt-pins');
  const dialog    = document.getElementById('cmt-dialog');
  const nameIn    = document.getElementById('cmt-name');
  const bodyIn    = document.getElementById('cmt-body');
  const submitBtn = document.getElementById('cmt-submit');
  const cancelBtn = document.getElementById('cmt-cancel');
  const popup     = document.getElementById('cmt-popup');

  let comments = [];
  let pending = null;
  let pinsVisible = true;

  const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

  function initialsOf(name) {
    const n = (name || '').trim();
    if (!n) return '?';
    const parts = n.split(/\s+/).slice(0, 2);
    return parts.map(p => p[0]).join('').toUpperCase();
  }

  function fmtTime(ms) {
    if (!ms) return 'just now';
    const d = new Date(ms);
    const now = new Date();
    const sameDay = d.toDateString() === now.toDateString();
    if (sameDay) return d.toLocaleTimeString([], {hour: 'numeric', minute: '2-digit'});
    return d.toLocaleDateString([], {month: 'short', day: 'numeric'}) + ' · ' + d.toLocaleTimeString([], {hour: 'numeric', minute: '2-digit'});
  }

  function pageWidth() {
    return document.documentElement.clientWidth || window.innerWidth;
  }

  function renderPins() {
    pinsEl.innerHTML = '';
    if (!pinsVisible) return;
    const w = pageWidth();
    comments.forEach((c, i) => {
      const pin = document.createElement('div');
      pin.className = 'cmt-pin';
      pin.style.left = (c.xFrac * w) + 'px';
      pin.style.top  = c.y + 'px';
      pin.dataset.id = c.id;
      pin.innerHTML = '<span>' + (i + 1) + '</span>';
      pin.addEventListener('click', (e) => {
        e.stopPropagation();
        showPopup(c, pin);
      });
      pinsEl.appendChild(pin);
    });
    const count = comments.length;
    badge.textContent = count;
    badge.classList.toggle('empty', count === 0);
  }

  function showPopup(c, pin) {
    popup.innerHTML = `
      <button class="cmt-popup-x" aria-label="Close">×</button>
      <div class="cmt-popup-meta">
        <div class="cmt-popup-initials">${esc(initialsOf(c.name))}</div>
        <div>
          <div class="cmt-popup-name">${esc(c.name || 'Anonymous')}</div>
          <div class="cmt-popup-time">${esc(fmtTime(c.ts))}</div>
        </div>
      </div>
      <div class="cmt-popup-body">${esc(c.body)}</div>
    `;
    const rect = pin.getBoundingClientRect();
    const popupW = 300;
    let left = rect.right + 14;
    if (left + popupW > window.innerWidth - 16) {
      left = Math.max(16, rect.left - popupW - 14);
    }
    let top = rect.top;
    if (top + 220 > window.innerHeight) {
      top = Math.max(16, window.innerHeight - 240);
    }
    popup.style.left = left + 'px';
    popup.style.top  = top + 'px';
    popup.classList.remove('hidden');
    popup.querySelector('.cmt-popup-x').addEventListener('click', () => {
      popup.classList.add('hidden');
    });
  }

  // Right click → composer
  document.addEventListener('contextmenu', (e) => {
    if (dialog.contains(e.target) || popup.contains(e.target) || toggleBtn.contains(e.target)) return;
    e.preventDefault();
    pending = {
      xFrac: e.pageX / pageWidth(),
      y:     e.pageY,
    };
    const dW = 300, dH = 220;
    let dx = e.clientX + 12;
    let dy = e.clientY + 12;
    if (dx + dW > window.innerWidth - 16)  dx = Math.max(16, e.clientX - dW - 12);
    if (dy + dH > window.innerHeight - 16) dy = Math.max(16, window.innerHeight - dH - 16);
    dialog.style.left = dx + 'px';
    dialog.style.top  = dy + 'px';
    dialog.classList.remove('hidden');
    popup.classList.add('hidden');

    const saved = localStorage.getItem(SAVED_NAME_KEY) || '';
    nameIn.value = saved;
    bodyIn.value = '';
    submitBtn.disabled = false;
    setTimeout(() => (saved ? bodyIn : nameIn).focus(), 60);
  });

  cancelBtn.addEventListener('click', () => {
    dialog.classList.add('hidden');
    pending = null;
  });

  async function postComment() {
    if (!pending) return;
    const name = nameIn.value.trim();
    const body = bodyIn.value.trim();
    if (!body) { bodyIn.focus(); return; }
    submitBtn.disabled = true;
    try {
      if (name) localStorage.setItem(SAVED_NAME_KEY, name);
      await addDoc(colRef, {
        name: name || 'Anonymous',
        body,
        page: PAGE_KEY,
        xFrac: pending.xFrac,
        y: pending.y,
        ts: serverTimestamp(),
      });
      dialog.classList.add('hidden');
      pending = null;
    } catch (err) {
      console.error('[comments] post failed', err);
      alert('Could not post comment: ' + err.message);
      submitBtn.disabled = false;
    }
  }
  submitBtn.addEventListener('click', postComment);
  bodyIn.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') { e.preventDefault(); postComment(); }
    if (e.key === 'Escape') { dialog.classList.add('hidden'); pending = null; }
  });
  nameIn.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); bodyIn.focus(); }
    if (e.key === 'Escape') { dialog.classList.add('hidden'); pending = null; }
  });

  // Toggle pin visibility
  toggleBtn.addEventListener('click', () => {
    pinsVisible = !pinsVisible;
    pinsEl.classList.toggle('hidden', !pinsVisible);
    toggleBtn.classList.toggle('active', pinsVisible);
    if (!pinsVisible) popup.classList.add('hidden');
  });

  // Outside click closes popup/dialog
  document.addEventListener('mousedown', (e) => {
    if (!popup.classList.contains('hidden')) {
      if (!popup.contains(e.target) && !e.target.closest('.cmt-pin')) {
        popup.classList.add('hidden');
      }
    }
    if (!dialog.classList.contains('hidden')) {
      if (!dialog.contains(e.target)) {
        dialog.classList.add('hidden'); pending = null;
      }
    }
  });

  // Re-render pins on resize
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(renderPins, 80);
  });

  // Live subscribe
  const q = query(colRef, orderBy('ts', 'asc'));
  onSnapshot(q, (snap) => {
    comments = [];
    snap.forEach(doc => {
      const d = doc.data();
      if (d.page !== PAGE_KEY) return;
      comments.push({
        id: doc.id,
        name: d.name,
        body: d.body,
        xFrac: typeof d.xFrac === 'number' ? d.xFrac : 0.5,
        y:     typeof d.y === 'number' ? d.y : 0,
        ts:    d.ts && d.ts.toMillis ? d.ts.toMillis() : null,
      });
    });
    renderPins();
  }, (err) => {
    console.error('[comments] subscribe failed', err);
  });
</script>

</body>
</html>
